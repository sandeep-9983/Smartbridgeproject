
<style>
#erd { padding: 0.5rem 0; min-height: 300px; }
#erd svg { width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path, #erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd-load { display:flex; align-items:center; justify-content:center; padding:2rem; }
</style>
<div id="erd-load"><span style="color:var(--text-secondary);font-size:13px">Rendering schema…</span></div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#2C2C2A' : '#F1EFE8',
  },
});
const diagram = `erDiagram
    USER ||--o{ HDI_INPUT_DATA : "submits"
    COUNTRY ||--o{ HDI_INPUT_DATA : "has"
    HDI_INPUT_DATA ||--|| HDI_PREDICTION : "generates"
    ML_MODEL ||--o{ HDI_PREDICTION : "produces"
    HDI_PREDICTION ||--o{ VISUALIZATION_REPORT : "generates"
    DATASET ||--o{ ML_MODEL : "trains"
    USER ||--o{ SESSION : "has"
    USER {
        int user_id PK
        string name
        string email
        string role
        timestamp created_at
    }
    COUNTRY {
        int country_id PK
        string country_name
        string region
        string iso_code
    }
    HDI_INPUT_DATA {
        int input_id PK
        int user_id FK
        int country_id FK
        float life_expectancy
        float education_index
        float gni_per_capita
        timestamp submitted_at
    }
    ML_MODEL {
        int model_id PK
        int dataset_id FK
        string model_name
        string algorithm
        float accuracy
        timestamp trained_at
    }
    HDI_PREDICTION {
        int prediction_id PK
        int input_id FK
        int model_id FK
        float hdi_score
        string hdi_category
        timestamp predicted_at
    }
    DATASET {
        int dataset_id PK
        string dataset_name
        string source
        int record_count
        timestamp created_at
    }
    VISUALIZATION_REPORT {
        int report_id PK
        int prediction_id FK
        string chart_type
        string file_path
        timestamp generated_at
    }
    SESSION {
        int session_id PK
        int user_id FK
        timestamp login_at
        timestamp logout_at
        string ip_address
    }`;
try {
  const { svg } = await mermaid.render('er-svg', diagram);
  document.getElementById('erd-load').style.display = 'none';
  document.getElementById('erd').innerHTML = svg;
  document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });
  document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
    p.setAttribute('stroke', 'none');
  });
  const svgEl = document.querySelector('#erd svg');
  if (svgEl) svgEl.setAttribute('width', '100%');
} catch(e) {
  document.getElementById('erd-load').innerHTML = '<p style="color:var(--text-danger);font-size:13px">Error: ' + e.message + '</p>';
}
</script>
